<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canva ➜ Brevo Ultra Cleaner 1.0.0a</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }

        textarea {
            scrollbar-width: thin;
        }
    </style>
</head>

<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4 font-sans text-slate-800">

    <div class="max-w-6xl w-full glass rounded-3xl shadow-2xl p-8 space-y-6">
        <header class="text-center">
            <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600">
                ULTIMATE EMAIL CLEANER
            </h1>
            <p class="text-slate-500 italic">Fix : Liens, Marges, Unités CSS et Scripts.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <textarea id="input"
                class="w-full h-96 p-4 border-2 border-slate-100 rounded-2xl text-[10px] font-mono outline-none focus:border-blue-400"
                placeholder="Colle le code Canva ici..."></textarea>
            <textarea id="output" readonly
                class="w-full h-96 p-4 bg-slate-50 border-2 border-transparent rounded-2xl text-[10px] font-mono shadow-inner"
                placeholder="Code optimisé..."></textarea>
        </div>

        <div class="flex flex-col items-center gap-4">
            <button onclick="processHTML()"
                class="px-12 py-5 bg-blue-600 text-white font-black rounded-2xl hover:scale-105 active:scale-95 transition-all shadow-xl">
                NETTOYER ET RÉPARER
            </button>
            <button id="copyBtn" onclick="copyCode()"
                class="hidden px-8 py-3 border-2 border-blue-600 text-blue-600 font-bold rounded-full transition-all">
                COPIER LE RÉSULTAT
            </button>
        </div>
        <p id="status" class="text-center text-sm font-bold text-emerald-500 h-6"></p>
    </div>

    <script>
        function processHTML() {
            const rawInput = document.getElementById('input').value;
            if (!rawInput) return;

            let clean = rawInput;

            // 1. SUPPRESSION DES BALISES INUTILES
            clean = clean.replace(/<link rel="preload"[^>]*>/gmi, "");
            clean = clean.replace(/<script\b[^>]*>([\s\S]*?)<\/script>/gmi, "");
            clean = clean.replace(/<meta name="keywords"[^>]*>/gmi, "");

            // 2. RÉPARATION DES UNITÉS CSS (Crucial pour Gmail)
            // Transforme "padding:20 0" en "padding:20px 0px"
            clean = clean.replace(/padding:\s?([0-9]+)\s+([0-9]+)/gi, "padding:$1px $2px");
            clean = clean.replace(/padding:\s?([0-9]+)px\s+([0-9]+)px/gi, "padding-left:$2px; padding-right:$2px; padding-top:$1px; padding-bottom:$1px;");

            // 3. FIX DES LIENS (ses:no-track et aria-labels qui bloquent)
            clean = clean.replace(/ses:no-track=""/gi, "");
            clean = clean.replace(/aria-label="[^"]*"/gmi, ""); // On dégage les labels qui contiennent des URLs
            clean = clean.replace(/white-space:\s?pre-wrap;?/gi, "");
            clean = clean.replace(/text-align:\s?justify;?/gi, "text-align:left;");

            // 4. SÉCURITÉ PROTOCOLE
            clean = clean.replace(/href="http:\/\/sbd\.fr/gi, 'href="https://sbd.fr');

            // 5. NETTOYAGE DES COMMENTAIRES (Correction de ton erreur JS)
            const commentRegex = new RegExp('', 'g');
            clean = clean.replace(commentRegex, "");

            // 6. MINIFICATION FINALE
            clean = clean.replace(/>\s+</g, "><");
            clean = clean.replace(/\s{2,}/g, " ");

            document.getElementById('output').value = clean.trim();
            document.getElementById('copyBtn').classList.remove('hidden');
            showStatus("✅ Liens et styles réparés !");
        }

        async function copyCode() {
            await navigator.clipboard.writeText(document.getElementById('output').value);
            showStatus("📋 Copié !");
        }

        function showStatus(msg) {
            document.getElementById('status').innerText = msg;
            setTimeout(() => document.getElementById('status').innerText = "", 3000);
        }
    </script>
</body>

</html>
