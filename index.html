<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canva ➜ Brevo Ultra Cleaner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4 font-sans text-slate-800">

    <div class="max-w-5xl w-full glass rounded-3xl shadow-2xl p-8 space-y-6">
        <header class="text-center">
            <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600">
                BREVO CLEANER PRO
            </h1>
            <p class="text-slate-500 italic">Correction des liens, des scripts et des marges mobiles.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <textarea id="input"
                class="w-full h-96 p-4 border-2 border-slate-100 rounded-2xl text-[10px] font-mono outline-none focus:border-purple-400"
                placeholder="Colle le code Canva ici..."></textarea>
            <textarea id="output" readonly
                class="w-full h-96 p-4 bg-slate-50 border-2 border-transparent rounded-2xl text-[10px] font-mono"
                placeholder="Le code optimisé apparaîtra ici..."></textarea>
        </div>

        <div class="flex gap-4 justify-center">
            <button onclick="processHTML()"
                class="px-8 py-4 bg-blue-600 text-white font-bold rounded-full hover:bg-blue-700 transition-all shadow-lg uppercase tracking-widest text-sm">
                NETTOYER LE CODE
            </button>
            <button id="copyBtn" onclick="copyCode()"
                class="hidden px-8 py-4 border-2 border-blue-600 text-blue-600 font-bold rounded-full hover:bg-blue-50 transition-all uppercase tracking-widest text-sm">
                COPIER LE RÉSULTAT
            </button>
        </div>
        <p id="status" class="text-center text-emerald-600 font-bold h-4"></p>
    </div>

    <script>
        function processHTML() {
            let clean = document.getElementById('input').value;
            if (!clean) return;

            // 1. Suppression du tag de non-tracking Canva (pour faire marcher les liens)
            clean = clean.replace(/ses:no-track=""/g, "");

            // 2. Suppression des balises <script>
            clean = clean.replace(/<script\b[^>]*>([\s\S]*?)<\/script>/gmi, "");

            // 3. FIX DES MARGES (L'étape qui te manque)
            // On retire 'pre-wrap' et 'justify' qui forcent le texte contre les bords sur mobile
            clean = clean.replace(/white-space:\s?pre-wrap;?/gi, "");
            clean = clean.replace(/text-align:\s?justify;?/gi, "text-align:left;");

            // 4. FIX COMPATIBILITÉ PADDING
            // On transforme padding: 0px 20px en padding-left/right pour une meilleure lecture par Brevo
            clean = clean.replace(/padding:\s?0px 20px;?/gi, "padding-left:20px; padding-right:20px;");

            // 5. Nettoyage des commentaires vides Canva
            clean = clean.replace(/\s*/g, "");

            document.getElementById('output').value = clean.trim();
            document.getElementById('copyBtn').classList.remove('hidden');
            showStatus("✨ Code optimisé : Liens & Marges réparés !");
        }

        async function copyCode() {
            const output = document.getElementById('output').value;
            await navigator.clipboard.writeText(output);
            showStatus("📋 Copié dans le presse-papier !");
        }

        function showStatus(msg) {
            const status = document.getElementById('status');
            status.innerText = msg;
            setTimeout(() => status.innerText = "", 3000);
        }
    </script>
</body>

</html>
